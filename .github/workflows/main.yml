name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure a temporary authenticated remote URL for Hugging Face
          git remote add hf https://loukaabed:$HF_TOKEN@huggingface.co/spaces/loukaabed/portfolio
          
          # 2. Force push the clean main branch to your Hugging Face Space space
          git push --force hf main
